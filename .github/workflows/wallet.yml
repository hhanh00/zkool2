name: Wallet Tests

on:
  workflow_dispatch:
  pull_request:
    branches:
    - main

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Install RUST
        uses: dtolnay/rust-toolchain@stable
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build zkool_graphql
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libudev-dev
          cd rust
          cargo build --release --bin zkool_graphql --features=graphql
      - name: Start ZecKit Devnet
        uses: intelliDean/ZecKit@m3-implementation
        with:
          backend: 'zaino'
          startup_timeout_minutes: '15'