name: "Build Android"
inputs:
  version:
    description: 'release version'
    required: true
runs:
  using: "composite"
  steps:
    - name: Build
      run: |
        echo "Building zkool version: ${RELEASE_VERSION}"
        flutter build apk --split-per-abi
        flutter build aab
        mv ./build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk ./${RELEASE_VERSION}-armeabi-v7a.apk
        mv ./build/app/outputs/flutter-apk/app-arm64-v8a-release.apk ./${RELEASE_VERSION}-arm64-v8a.apk
        mv ./build/app/outputs/flutter-apk/app-x86_64-release.apk ./${RELEASE_VERSION}-x86_64.apk
      env:
        RELEASE_VERSION: zkool-${{ inputs.version }}
    - name: Upload apk artifact
      uses: actions/upload-artifact@v4
      with:
        path: |
          ./build/app/outputs/bundle/release/app-release.aab
    - name: Create Release
      if: startsWith(github.ref_name, 'zkool-v')
      uses: softprops/action-gh-release@v2
      with:
        files: ./*.apk
        draft: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
