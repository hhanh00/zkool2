name: "Build Android"
inputs:
  version:
    description: release version
    required: true
outputs:
  outdir:
    description: release directory
runs:
  using: "composite"
  steps:
    - name: Build
      shell: bash
      run: |
        echo "Building zkool version: ${RELEASE_VERSION}"
        flutter build apk --split-per-abi
        flutter build aab
        mkdir out
        mv ./build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk ./out/${RELEASE_VERSION}-armeabi-v7a.apk
        mv ./build/app/outputs/flutter-apk/app-arm64-v8a-release.apk ./out/${RELEASE_VERSION}-arm64-v8a.apk
        mv ./build/app/outputs/flutter-apk/app-x86_64-release.apk ./out/${RELEASE_VERSION}-x86_64.apk
        echo "outdir=$PWD/out" >> $GITHUB_OUTPUT
      env:
        RELEASE_VERSION: zkool-${{ inputs.version }}
